# -------------------------------------------------------------------
# Knative Service for FastAPI backend (ltt-lca-api).
#
# Secrets come from the ltt-mssql-secrets Secret object.
# Scale-to-zero when idle; auto-scale under load.
# -------------------------------------------------------------------
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ltt-lca-api
  namespace: ltt-lca-prod
  labels:
    app: ltt-cloud
    component: api
  annotations:
    # Scale-to-zero configuration
    autoscaling.knative.dev/minScale: "0"
    autoscaling.knative.dev/maxScale: "20"
spec:
  template:
    metadata:
      labels:
        app: ltt-cloud
        component: api
    spec:
      containerConcurrency: 10
      containers:
        - image: registry.k8s.eonerc.rwth-aachen.de/ltt-lca/api:latest
          ports:
            - containerPort: 8000
          # Sensitive env vars from K8s Secret -- never hardcoded.
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ltt-mssql-secrets
                  key: connection-string
            - name: REDIS_URL
              value: "redis://redis.ltt-lca-prod.svc.cluster.local:6379"
            - name: ENVIRONMENT
              value: "prod"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ltt-cloud-secrets
                  key: JWT_SECRET_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
  traffic:
    - latestRevision: true
      percent: 100
