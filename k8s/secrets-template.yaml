# -------------------------------------------------------------------
# Kubernetes Secret for LTT Cloud.
#
# DO NOT commit real values here.  This file is a TEMPLATE.
# Create the actual secret via:
#
#   kubectl create secret generic ltt-cloud-secrets \
#     --namespace=ltt-lca \
#     --from-literal=DATABASE_URL='postgresql://USER:PASS@HOST:5432/DB' \
#     --from-literal=REDIS_URL='redis://HOST:6379/0' \
#     --from-literal=ENVIRONMENT='prod'
#
# Or apply a sealed/encrypted version in CI.
# -------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: ltt-cloud-secrets
  namespace: ltt-lca
  labels:
    app: ltt-cloud
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_ME"
  REDIS_URL: "REPLACE_ME"
  ENVIRONMENT: "prod"
  POSTGRES_USER: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "REPLACE_ME"
