# -------------------------------------------------------------------
# Full CI/CD: Secret scan, MSSQL RLS tests, Docker security, deploy
#
# Required GitHub Secrets:
#   RWTH_KUBECONFIG        -- base64-encoded kubeconfig
#   RWTH_REGISTRY_USER     -- container registry login
#   RWTH_REGISTRY_TOKEN    -- container registry password
# -------------------------------------------------------------------
name: LTT Cloud CI/CD (MSSQL + RLS + Security)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------
  # 1. Secret scanning -- runs before anything else
  # ------------------------------------------------------------------
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --exclude-path ./.trufflehog-ignore.txt

  # ------------------------------------------------------------------
  # 2. MSSQL + RLS tests with a real SQL Server container
  # ------------------------------------------------------------------
  test-mssql-rls:
    needs: secret-scan
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: "YourStrong@Passw0rd123"
          ACCEPT_EULA: Y
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd123' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ODBC driver
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [signed-by=/usr/share/keyrings/microsoft-prod.gpg] \
            https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | \
            sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 unixodbc-dev

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pyodbc pytest-cov

      - name: Setup MSSQL schema and RLS
        env:
          MSSQL_CONNECTION_STRING: >-
            mssql+pyodbc://sa:YourStrong@Passw0rd123@localhost:1433/master?driver=ODBC+Driver+17+for+SQL+Server&TrustServerCertificate=yes
        run: |
          sleep 30
          python scripts/setup_mssql_test.py

      - name: Run MSSQL RLS tests
        env:
          MSSQL_CONNECTION_STRING: >-
            mssql+pyodbc://sa:YourStrong@Passw0rd123@localhost:1433/ltt_lca_test?driver=ODBC+Driver+17+for+SQL+Server&TrustServerCertificate=yes
          JWT_SECRET_KEY: "test-jwt-secret-key-32-chars-long!!!!"
          DATABASE_URL: "sqlite://"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: "dev"
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml

  # ------------------------------------------------------------------
  # 3. Docker build + Trivy security scan
  # ------------------------------------------------------------------
  docker-build:
    needs: test-mssql-rls
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build -f docker/Dockerfile.api -t ltt-cloud-api:ci .

      - name: Build UI image
        run: |
          docker build -f docker/Dockerfile.ui -t ltt-cloud-ui:ci .

      - name: Trivy security scan (API)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ltt-cloud-api:ci"
          format: "sarif"
          output: "trivy-api.sarif"

      - name: Trivy security scan (UI)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ltt-cloud-ui:ci"
          format: "sarif"
          output: "trivy-ui.sarif"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-api.sarif"

  # ------------------------------------------------------------------
  # 4. Deploy to RWTH Staging (develop branch only)
  # ------------------------------------------------------------------
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to RWTH Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.k8s.eonerc.rwth-aachen.de
          username: ${{ secrets.RWTH_REGISTRY_USER }}
          password: ${{ secrets.RWTH_REGISTRY_TOKEN }}

      - name: Build and push staging images
        run: |
          docker build -f docker/Dockerfile.api \
            -t registry.k8s.eonerc.rwth-aachen.de/ltt-lca/api:staging .
          docker build -f docker/Dockerfile.ui \
            -t registry.k8s.eonerc.rwth-aachen.de/ltt-lca/ui:staging .
          docker push registry.k8s.eonerc.rwth-aachen.de/ltt-lca/api:staging
          docker push registry.k8s.eonerc.rwth-aachen.de/ltt-lca/ui:staging

      - name: Setup kn CLI
        uses: redhat-actions/install-kn@v1
        with:
          version: "v1.13.2"

      - name: Deploy API to staging
        uses: redhat-actions/kn-service-manager@v1
        with:
          service_name: ltt-lca-api
          container_image: registry.k8s.eonerc.rwth-aachen.de/ltt-lca/api:staging
          namespace: ltt-lca-staging
          kubeconfig: ${{ secrets.RWTH_KUBECONFIG }}

      - name: Deploy UI to staging
        uses: redhat-actions/kn-service-manager@v1
        with:
          service_name: ltt-lca-ui
          container_image: registry.k8s.eonerc.rwth-aachen.de/ltt-lca/ui:staging
          namespace: ltt-lca-staging
          kubeconfig: ${{ secrets.RWTH_KUBECONFIG }}
