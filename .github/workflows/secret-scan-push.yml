# -------------------------------------------------------------------
# Push-time secret scanning -- blocks pushes containing secrets.
# -------------------------------------------------------------------
name: Push Secret Protection

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Block secret push
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base_ref: HEAD~1
          head_ref: HEAD
          extra_args: --fail
